<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title><!--{title}--></title>
<meta name="keywords" content="<!--{keyWords}-->">
<meta name="description" content="<!--{OPT.siteDescription}-->">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;background:#f4f4f9;color:#333}
.header-banner{height:250px;background:linear-gradient(135deg,#6a11cb,#2575fc),url('https://via.placeholder.com/1600x900/007bff/fff?text=Banner');background-size:cover;background-position:center;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;border-bottom-left-radius:20px;border-bottom-right-radius:20px}
.article-card{border:none;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,.1);transition:.3s}
.article-card:hover{transform:translateY(-8px);box-shadow:0 10px 25px rgba(0,0,0,.15)}
.article-img{height:180px;object-fit:cover;width:100%}
.card-text{overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.sidebar-widget{background:#fff;padding:1.5rem;border-radius:15px;box-shadow:0 3px 10px rgba(0,0,0,.05);margin-bottom:1.5rem}
.tag-badge{font-size:.85rem;margin:.2rem}
.footer{background:#343a40;color:#fff;padding:2rem 0}
</style>
<!--{OPT.codeBeforHead}-->
</head>
<body>

<div class="header-banner">
  <div>
    <h1 class="display-4 fw-bold"><!--{OPT.siteName}--></h1>
    <p class="lead"><!--{OPT.siteDescription}--></p>
  </div>
</div>

<div class="container my-5">
  <div class="row">

    <!-- 文章列表 -->
    <div class="col-lg-8">
      <div class="row">
        <!--{articleList}-->
        <div class="col-md-6 mb-4">
          <div class="card article-card h-100">
            <img src="https://p.sda1.dev/28/7f9ff7baba7b7b1b87f0ced61b7f49a3/pexels-vlada-karpovich-4668351.jpg" >-->" class="card-img-top article-img" alt="<!--{title}-->">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title"><a href="<!--{url}-->" class="text-decoration-none text-dark"><!--{title}--></a></h5>
              <p class="card-text text-muted small"><!--{contentText}--></p>
              <div class="mt-auto d-flex justify-content-between align-items-center">
                <small class="text-muted"><i class="bi bi-calendar-event"></i> <!--{createDate10}--> | <i class="bi bi-chat-dots"></i> <!--{contentLength}-->字</small>
                <a href="<!--{url}-->" class="btn btn-sm btn-outline-primary">阅读更多</a>
              </div>
            </div>
          </div>
        </div>
        <!--{/articleList}-->
      </div>

      <!-- 分页 -->
      <nav class="mt-4">
        <ul class="pagination justify-content-center">
          <!--{pageNewer}--><li class="page-item"><a class="page-link" href="<!--{url}-->">上一页</a></li><!--{/pageNewer}-->
          <!--{pageOlder}--><li class="page-item"><a class="page-link" href="<!--{url}-->">下一页</a></li><!--{/pageOlder}-->
        </ul>
      </nav>
    </div>

    <!-- 侧边栏 -->
    <div class="col-lg-4">
      <div class="sidebar-widget">
        <h5 class="mb-3">关于我</h5>
        <img src="https://p.sda1.dev/28/e7282af0bf6a709de1bd144929560de7/bb4d96445433884d54698ead886b9b21.jpg" class="rounded-circle mb-3" width="100" height="100" alt="头像">
        <p class="small text-muted">Willing，广漂00后，记录编程与生活。<br>QQ:2376784831 | X:@btc_16888</p>
      </div>

      <div class="sidebar-widget">
        <h5 class="mb-3">最近文章</h5>
        <ul class="list-unstyled">
          <!--{widgetRecentlyList}-->
          <li class="mb-2"><a href="<!--{url}-->" class="text-decoration-none small text-muted"><i class="bi bi-chevron-right"></i> <!--{title}--></a></li>
          <!--{/widgetRecentlyList}-->
        </ul>
      </div>

      <div class="sidebar-widget">
        <h5 class="mb-3">分类</h5>
        <!--{widgetCategoryList}-->
        <a href="/category/<!--{.}-->" class="badge bg-primary text-white tag-badge"><!--{.}--></a>
        <!--{/widgetCategoryList}-->
      </div>

      <div class="sidebar-widget">
        <h5 class="mb-3">标签</h5>
        <!--{widgetTagsList}-->
        <a href="/tags/<!--{.}-->" class="badge bg-secondary text-white tag-badge"><!--{.}--></a>
        <!--{/widgetTagsList}-->
      </div>
    </div>

  </div>
</div>

<footer class="footer text-center">
  <div class="container">
    <p class="small"><!--{OPT.copyRight}--></p>
  </div>
</footer>

<!--{OPT.codeBeforBody}-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
